<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Cube with Larger Platforms and Capped Lateral Movement</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }

        #nameOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #87CEEB, #4a90d9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #nameCard {
            background: rgba(255,255,255,0.95);
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 360px;
        }
        #nameCard h1 {
            margin: 0 0 8px;
            font-size: 24px;
            color: #333;
        }
        #nameCard p {
            margin: 0 0 20px;
            color: #666;
            font-size: 14px;
        }
        #nameInput {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 8px;
            outline: none;
            margin-bottom: 16px;
        }
        #nameInput:focus {
            border-color: #4a90d9;
        }
        #startButton {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: #4a90d9;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #startButton:hover {
            background: #3a7bc0;
        }
        #nameOverlay.hidden {
            display: none;
        }

        #gameControls {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 50;
            display: none;
            gap: 10px;
        }
        #gameControls.visible {
            display: flex;
        }
        #gameControls button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: rgba(0,0,0,0.55);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #gameControls button:hover {
            background: rgba(0,0,0,0.75);
        }

        #pauseOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 90;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #pauseOverlay.visible {
            display: flex;
        }
        #pauseCard {
            background: rgba(255,255,255,0.97);
            padding: 36px 46px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            text-align: center;
            min-width: 260px;
        }
        #pauseCard h1 {
            margin: 0 0 20px;
            font-size: 22px;
            color: #333;
        }
        #pauseCard button {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s;
        }
        #resumeButton {
            background: #4a90d9;
        }
        #resumeButton:hover {
            background: #3a7bc0;
        }
        #pauseRestartButton {
            background: #e67e22;
            margin-bottom: 0;
        }
        #pauseRestartButton:hover {
            background: #cf6c14;
        }
        #scoreDisplay {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 50;
            display: none;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.55);
            padding: 8px 18px;
            border-radius: 22px;
        }
        #scoreDisplay.visible {
            display: block;
        }
        #scoreDisplay.boosted {
            background: rgba(220, 60, 30, 0.75);
        }

        #timerDisplay {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: none;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.55);
            padding: 8px 18px;
            border-radius: 22px;
        }
        #timerDisplay.visible {
            display: block;
        }
        #timerDisplay.urgent {
            background: rgba(220, 30, 30, 0.85);
        }

        #gameOverOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 95;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #gameOverOverlay.visible {
            display: flex;
        }
        #gameOverCard {
            background: rgba(255,255,255,0.97);
            padding: 36px 46px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            text-align: center;
            min-width: 260px;
        }
        #gameOverCard h1 {
            margin: 0 0 8px;
            font-size: 24px;
            color: #333;
        }
        #gameOverCard p {
            margin: 0 0 20px;
            color: #666;
            font-size: 16px;
        }
        #gameOverRestartButton {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: #e67e22;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #gameOverRestartButton:hover {
            background: #cf6c14;
        }
    </style>
</head>
<body>
    <div id="scoreDisplay">得分: 0</div>
    <div id="timerDisplay">02:00</div>
    <div id="gameOverOverlay">
        <div id="gameOverCard">
            <h1>时间到！</h1>
            <p id="finalScoreText">最终得分: 0</p>
            <button id="gameOverRestartButton">再来一局</button>
        </div>
    </div>
    <div id="gameControls">
        <button id="pauseButton" title="暂停 (P)">⏸</button>
        <button id="restartButton" title="重新开始">⟲</button>
    </div>
    <div id="pauseOverlay">
        <div id="pauseCard">
            <h1>游戏已暂停</h1>
            <button id="resumeButton">继续游戏</button>
            <button id="pauseRestartButton">重新开始</button>
        </div>
    </div>
    <div id="nameOverlay">
        <div id="nameCard">
            <h1>输入你的名字</h1>
            <input type="text" id="nameInput" placeholder="玩家名字" maxlength="16" autocomplete="off">
            <button id="startButton">开始游戏</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script>
        // Set up the scene, camera, and renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);  // Sky blue background
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Set up the physics world
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);

        // Create a cube
        const cubeSize = 1;
        const cubeGeometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        const cubeMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
        const cubeMesh = new THREE.Mesh(cubeGeometry, cubeMaterial);
        cubeMesh.castShadow = true;
        scene.add(cubeMesh);

        // Map of recognized words (Chinese + English) to an emoji symbol.
        // If the player's input matches one of these, the falling cube becomes that symbol.
        const symbolMap = {
            '狗': '🐶', 'dog': '🐶',
            '猫': '🐱', 'cat': '🐱',
            '兔子': '🐰', '兔': '🐰', 'rabbit': '🐰',
            '熊': '🐻', 'bear': '🐻',
            '熊猫': '🐼', 'panda': '🐼',
            '老虎': '🐯', 'tiger': '🐯',
            '狮子': '🦁', 'lion': '🦁',
            '猴子': '🐵', '猴': '🐵', 'monkey': '🐵',
            '猪': '🐷', 'pig': '🐷',
            '牛': '🐮', 'cow': '🐮',
            '羊': '🐑', 'sheep': '🐑',
            '鸡': '🐔', 'chicken': '🐔',
            '鸟': '🐦', 'bird': '🐦',
            '鱼': '🐟', 'fish': '🐟',
            '龙': '🐉', 'dragon': '🐉',
            '马': '🐴', 'horse': '🐴',
            '狐狸': '🦊', 'fox': '🦊',
            '象': '🐘', 'elephant': '🐘',
            '恐龙': '🦖', 'dinosaur': '🦖',
            '星星': '⭐', 'star': '⭐',
            '心': '❤️', 'heart': '❤️',
            '苹果': '🍎', 'apple': '🍎',
            '火箭': '🚀', 'rocket': '🚀',
            '太阳': '☀️', 'sun': '☀️',
            '月亮': '🌙', 'moon': '🌙',
            '足球': '⚽', 'football': '⚽', 'soccer': '⚽',
            '篮球': '🏀', 'basketball': '🏀',
            '汽车': '🚗', 'car': '🚗',
            '飞机': '✈️', 'plane': '✈️', 'airplane': '✈️',
            '花': '🌸', 'flower': '🌸',
            '树': '🌳', 'tree': '🌳',
            '钻石': '💎', 'diamond': '💎',
            '皇冠': '👑', 'crown': '👑',
        };

        // Classify the player's input: pure number, recognized symbol, or a plain name
        function classifyInput(rawName) {
            const trimmed = rawName.trim();
            if (trimmed.length === 0) {
                return { type: 'name', text: 'Player' };
            }
            if (/^-?\d+(\.\d+)?$/.test(trimmed)) {
                return { type: 'number', text: trimmed };
            }
            const lower = trimmed.toLowerCase();
            if (symbolMap[trimmed] || symbolMap[lower]) {
                return { type: 'symbol', text: symbolMap[trimmed] || symbolMap[lower] };
            }
            return { type: 'name', text: trimmed };
        }

        // Build a square canvas texture for the cube based on the classification
        function createCubeTexture(classified) {
            const size = 256;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            let bgColor = '#4a90d9';
            if (classified.type === 'number') bgColor = '#2c3e50';
            if (classified.type === 'symbol') bgColor = '#ffffff';
            if (classified.type === 'name') bgColor = '#e67e22';

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, size, size);

            // Border
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 8;
            ctx.strokeRect(4, 4, size - 8, size - 8);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (classified.type === 'symbol') {
                ctx.font = `${size * 0.65}px Arial`;
                ctx.fillText(classified.text, size / 2, size / 2 + size * 0.05);
            } else if (classified.type === 'number') {
                ctx.fillStyle = '#ffffff';
                let fontSize = size * 0.55;
                ctx.font = `bold ${fontSize}px Arial`;
                while (ctx.measureText(classified.text).width > size * 0.85 && fontSize > 20) {
                    fontSize -= 4;
                    ctx.font = `bold ${fontSize}px Arial`;
                }
                ctx.fillText(classified.text, size / 2, size / 2);
            } else {
                ctx.fillStyle = '#ffffff';
                let fontSize = size * 0.32;
                ctx.font = `bold ${fontSize}px "Microsoft YaHei", Arial, sans-serif`;
                while (ctx.measureText(classified.text).width > size * 0.85 && fontSize > 14) {
                    fontSize -= 3;
                    ctx.font = `bold ${fontSize}px "Microsoft YaHei", Arial, sans-serif`;
                }
                ctx.fillText(classified.text, size / 2, size / 2);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        // Apply the classified input as a texture on all faces of the cube
        function applyCubeAppearance(rawName) {
            const classified = classifyInput(rawName);
            const texture = createCubeTexture(classified);
            cubeMesh.material = new THREE.MeshPhongMaterial({ map: texture });
        }

        const cubeShape = new CANNON.Box(new CANNON.Vec3(cubeSize/2, cubeSize/2, cubeSize/2));
        const cubeBody = new CANNON.Body({
            mass: 5,
            shape: cubeShape,
        });
        world.addBody(cubeBody);

        // Scoring: +1 each time the cube touches a new platform for the first time
        let score = 0;
        const scoredBodyIds = new Set();
        const baseGravityY = -9.82;
        const baseForce = 10;
        const baseMaxSpeed = 10;
        let speedMultiplier = 1;
        let speedBoosted = false;
        const scoreDisplay = document.getElementById('scoreDisplay');

        function updateScoreDisplay() {
            scoreDisplay.textContent = `得分: ${score}`;
        }

        function checkSpeedBoost() {
            if (!speedBoosted && score >= 30) {
                speedBoosted = true;
                speedMultiplier = 1.5;
                world.gravity.set(0, baseGravityY * speedMultiplier, 0);
                scoreDisplay.classList.add('boosted');
            }
        }

        cubeBody.addEventListener('collide', (event) => {
            const otherId = event.body.id;
            if (otherId === cubeBody.id) return;
            if (!scoredBodyIds.has(otherId)) {
                scoredBodyIds.add(otherId);
                score++;
                updateScoreDisplay();
                checkSpeedBoost();
            }
        });

        function resetScore() {
            score = 0;
            scoredBodyIds.clear();
            speedMultiplier = 1;
            speedBoosted = false;
            world.gravity.set(0, baseGravityY, 0);
            scoreDisplay.classList.remove('boosted');
            updateScoreDisplay();
        }

        // 2-minute countdown timer
        const GAME_DURATION = 120; // seconds
        let timeLeft = GAME_DURATION;
        let timerInterval = null;
        const timerDisplay = document.getElementById('timerDisplay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreText = document.getElementById('finalScoreText');
        const gameOverRestartButton = document.getElementById('gameOverRestartButton');

        function formatTime(totalSeconds) {
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = Math.floor(totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = formatTime(timeLeft);
            timerDisplay.classList.toggle('urgent', timeLeft <= 10);
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = GAME_DURATION;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (isPaused) return;
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    updateTimerDisplay();
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            isPaused = true;
            finalScoreText.textContent = `最终得分: ${score}`;
            gameOverOverlay.classList.add('visible');
        }

        // Improved lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(5, 10, 7.5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        directionalLight.shadow.camera.near = 1;
        directionalLight.shadow.camera.far = 50;
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.5, 100);
        pointLight.castShadow = true;
        scene.add(pointLight);

        // Set up camera to follow the cube
        camera.position.set(0, 5, 10);
        camera.lookAt(cubeMesh.position);

        // World landmarks shown on top of platforms
        const landmarks = [
            '埃菲尔铁塔', '自由女神像', '长城', '金字塔', '悉尼歌剧院',
            '泰姬陵', '大本钟', '斗兽场', '比萨斜塔', '富士山',
            '尼亚加拉大瀑布', '圣托里尼', '马丘比丘', '吴哥窟', '兵马俑',
            '故宫', '布达拉宫', '凯旋门', '克里姆林宫', '大峡谷',
            '姆巴拉拉', '尼亚加拉', '罗马斗兽场', '西西里', '威尼斯',
            '好望角', '巨石阵', '樱花大道', '珠穆朗玛峰', '天坛'
        ];

        // Create a canvas texture with a landmark name painted on a colored background,
        // sized to roughly match the platform's proportions
        function createPlatformTopTexture(name, colorHex, width, depth) {
            const scale = 60;
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(128, Math.round(width * scale));
            canvas.height = Math.max(128, Math.round(depth * scale));
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#' + colorHex.toString(16).padStart(6, '0');
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = 'rgba(0,0,0,0.55)';
            ctx.lineWidth = 5;

            let fontSize = Math.floor(canvas.height * 0.24);
            ctx.font = `bold ${fontSize}px "Microsoft YaHei", Arial, sans-serif`;
            while (ctx.measureText(name).width > canvas.width * 0.88 && fontSize > 12) {
                fontSize -= 2;
                ctx.font = `bold ${fontSize}px "Microsoft YaHei", Arial, sans-serif`;
            }
            ctx.strokeText(name, canvas.width / 2, canvas.height / 2);
            ctx.fillText(name, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        // Function to create a random platform
        function createPlatform() {
            const height = 0.5;
            const platformColors = [0x8888ff, 0xff8888, 0x88ff88, 0xffcc66, 0xff66cc, 0x66ffff, 0xcc88ff, 0xffff66];
            const color = platformColors[Math.floor(Math.random() * platformColors.length)];
            const landmarkName = landmarks[Math.floor(Math.random() * landmarks.length)];

            const shapeTypes = ['square', 'circle', 'triangle'];
            const shapeType = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];

            const sideMaterial = new THREE.MeshPhongMaterial({ color: color });

            let geometry, mesh, cannonShape;

            if (shapeType === 'square') {
                const width = Math.random() * 6 + 6;
                const depth = Math.random() * 6 + 6;

                geometry = new THREE.BoxGeometry(width, height, depth);
                const topTexture = createPlatformTopTexture(landmarkName, color, width, depth);
                const topMaterial = new THREE.MeshPhongMaterial({ map: topTexture });
                // BoxGeometry face order: [+x, -x, +y, -y, +z, -z] — index 2 is the top face
                const materials = [sideMaterial, sideMaterial, topMaterial, sideMaterial, sideMaterial, sideMaterial];
                mesh = new THREE.Mesh(geometry, materials);

                cannonShape = new CANNON.Box(new CANNON.Vec3(width / 2, height / 2, depth / 2));
            } else {
                // circle -> smooth cylinder, triangle -> 3-sided prism (same geometry, fewer segments)
                const radius = Math.random() * 3 + 3.5;
                const segments = shapeType === 'circle' ? 32 : 3;

                geometry = new THREE.CylinderGeometry(radius, radius, height, segments);
                const topTexture = createPlatformTopTexture(landmarkName, color, radius * 2, radius * 2);
                const topMaterial = new THREE.MeshPhongMaterial({ map: topTexture });
                // CylinderGeometry face order: [side, top cap, bottom cap]
                const materials = [sideMaterial, topMaterial, sideMaterial];
                mesh = new THREE.Mesh(geometry, materials);

                cannonShape = new CANNON.Cylinder(radius, radius, height, segments);
            }

            mesh.receiveShadow = true;

            const body = new CANNON.Body({ mass: 0 });
            if (shapeType === 'square') {
                body.addShape(cannonShape);
            } else {
                // CANNON.Cylinder's axis runs along local Z; rotate it to stand upright along Y
                const uprightRotation = new CANNON.Quaternion();
                uprightRotation.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
                body.addShape(cannonShape, new CANNON.Vec3(), uprightRotation);
            }

            const x = Math.random() * 14 - 7;
            const y = -15 * platformCount;
            const z = Math.random() * 14 - 7;

            mesh.position.set(x, y, z);
            body.position.set(x, y, z);

            scene.add(mesh);
            world.addBody(body);

            return { mesh, body };
        }

        const platforms = [];
        let platformCount = 0;
        const maxPlatforms = 10;

        // Handle keyboard input
        const keys = {};
        document.addEventListener('keydown', (event) => { keys[event.code] = true; });
        document.addEventListener('keyup', (event) => { keys[event.code] = false; });

        function handleInput() {
            const force = baseForce * speedMultiplier;
            const impulse = new CANNON.Vec3();
            if (keys['ArrowUp']) impulse.z = -force;
            if (keys['ArrowDown']) impulse.z = force;
            if (keys['ArrowLeft']) impulse.x = -force;
            if (keys['ArrowRight']) impulse.x = force;
            cubeBody.applyImpulse(impulse, cubeBody.position);

            // Apply boundaries
            const boundary = 10;
            if (Math.abs(cubeBody.position.x) > boundary) {
                cubeBody.position.x = Math.sign(cubeBody.position.x) * boundary;
                cubeBody.velocity.x = 0;
            }
            if (Math.abs(cubeBody.position.z) > boundary) {
                cubeBody.position.z = Math.sign(cubeBody.position.z) * boundary;
                cubeBody.velocity.z = 0;
            }

            // Cap falling speed
            const maxSpeed = baseMaxSpeed * speedMultiplier;
            if (cubeBody.velocity.y < -maxSpeed) {
                cubeBody.velocity.y = -maxSpeed;
            }

            // Cap lateral speed
            const lateralVelocity = new CANNON.Vec3(cubeBody.velocity.x, 0, cubeBody.velocity.z);
            if (lateralVelocity.length() > maxSpeed) {
                lateralVelocity.normalize();
                lateralVelocity.scale(maxSpeed, lateralVelocity);
                cubeBody.velocity.x = lateralVelocity.x;
                cubeBody.velocity.z = lateralVelocity.z;
            }
        }

        // Animation loop
        let animationId = null;
        let isPaused = false;

        function animate() {
            animationId = requestAnimationFrame(animate);
            if (isPaused) return;

            handleInput();
            world.step(1/60);

            // Update cube position
            cubeMesh.position.copy(cubeBody.position);
            cubeMesh.quaternion.copy(cubeBody.quaternion);

            // Update camera position
            camera.position.set(
                cubeBody.position.x,
                cubeBody.position.y + 5,
                cubeBody.position.z + 10
            );
            camera.lookAt(cubeMesh.position);

            // Update point light position
            pointLight.position.set(
                cubeBody.position.x,
                cubeBody.position.y + 10,
                cubeBody.position.z
            );

            // Generate new platforms and remove old ones
            if (platforms.length < maxPlatforms) {
                platforms.push(createPlatform());
                platformCount++;
            }

            if (cubeBody.position.y < platforms[0].body.position.y - 30) {
                scene.remove(platforms[0].mesh);
                world.removeBody(platforms[0].body);
                platforms.shift();
            }

            renderer.render(scene, camera);
        }

        // Name entry flow: wait for the player to submit a name before starting
        const nameOverlay = document.getElementById('nameOverlay');
        const nameInput = document.getElementById('nameInput');
        const startButton = document.getElementById('startButton');

        function startGame() {
            applyCubeAppearance(nameInput.value);

            nameOverlay.classList.add('hidden');
            gameControls.classList.add('visible');
            scoreDisplay.classList.add('visible');
            timerDisplay.classList.add('visible');
            updateScoreDisplay();
            startTimer();
            animate();
        }

        startButton.addEventListener('click', startGame);
        nameInput.addEventListener('keydown', (event) => {
            if (event.code === 'Enter') startGame();
        });
        nameInput.focus();

        // Pause / resume / restart controls
        const gameControls = document.getElementById('gameControls');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const pauseButton = document.getElementById('pauseButton');
        const resumeButton = document.getElementById('resumeButton');
        const restartButton = document.getElementById('restartButton');
        const pauseRestartButton = document.getElementById('pauseRestartButton');

        function pauseGame() {
            if (isPaused) return;
            isPaused = true;
            pauseButton.textContent = '▶';
            pauseButton.title = '继续 (P)';
            pauseOverlay.classList.add('visible');
        }

        function resumeGame() {
            if (!isPaused) return;
            if (gameOverOverlay.classList.contains('visible')) return;
            isPaused = false;
            pauseButton.textContent = '⏸';
            pauseButton.title = '暂停 (P)';
            pauseOverlay.classList.remove('visible');
        }

        function togglePause() {
            if (isPaused) resumeGame();
            else pauseGame();
        }

        function restartGame() {
            // Reset the cube
            cubeBody.position.set(0, 3, 0);
            cubeBody.velocity.set(0, 0, 0);
            cubeBody.angularVelocity.set(0, 0, 0);
            cubeBody.quaternion.set(0, 0, 0, 1);

            // Clear all existing platforms
            while (platforms.length > 0) {
                const platform = platforms.pop();
                scene.remove(platform.mesh);
                world.removeBody(platform.body);
            }
            platformCount = 0;

            resetScore();
            gameOverOverlay.classList.remove('visible');
            startTimer();
            resumeGame();
        }

        pauseButton.addEventListener('click', togglePause);
        restartButton.addEventListener('click', restartGame);
        resumeButton.addEventListener('click', resumeGame);
        pauseRestartButton.addEventListener('click', restartGame);
        gameOverRestartButton.addEventListener('click', restartGame);

        document.addEventListener('keydown', (event) => {
            if (event.code === 'KeyP' && gameControls.classList.contains('visible')) {
                togglePause();
            }
        });

        // Handle window resizing
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
