<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Préstamo de Tiempo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#eef2f8;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#1a1a2e;touch-action:manipulation;user-select:none;-webkit-user-select:none}
  #game{position:fixed;inset:0;display:block;touch-action:none}
  #controls{position:fixed;left:0;right:0;bottom:0;display:flex;flex-direction:column;
    gap:5px;padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));z-index:5;
    background:linear-gradient(to top,rgba(220,230,245,0.98) 70%,transparent)}
  #scoreRow{display:flex;align-items:center;gap:10px;min-height:52px}
  #collectedLabel{font-size:13px;color:#5a6a8a;white-space:nowrap;padding-top:4px}
  #collectedCoins{flex:1;display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-height:36px}
  .coin-icon{width:36px;height:36px;border-radius:50%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-size:11px;font-weight:700;
    color:#fff;flex-shrink:0;animation:coinB .3s ease;overflow:hidden;line-height:1.1}
  .coin-icon.big{width:42px;height:42px;font-size:13px}
  @keyframes coinB{
    0%{transform:scale(0) translateY(-8px);opacity:0}
    60%{transform:scale(1.3) translateY(-2px);opacity:1}
    100%{transform:scale(1) translateY(0);opacity:1}
  }
  #hint{font-size:12px;color:#8899b8;text-align:center;padding-top:2px}

  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    background:rgba(220,230,245,0.97);padding:24px;z-index:20}
  #overlayTitle{font-size:30px;font-weight:800;margin-bottom:12px;letter-spacing:.5px;color:#1a1a2e}
  #btnMain{font-size:20px;font-weight:700;padding:16px 40px;border:none;border-radius:14px;
    background:linear-gradient(180deg,#f5b840,#c8820a);color:#fff;cursor:pointer;
    box-shadow:0 6px 18px rgba(200,130,10,.3)}
  #btnMain:active{transform:translateY(1px)}

  #nameModal{display:none;position:fixed;inset:0;background:rgba(220,230,245,.98);z-index:30;
    flex-direction:column;align-items:center;justify-content:center;padding:24px}
  #nameModal.show{display:flex}
  #nameTitle{font-size:22px;font-weight:700;margin-bottom:6px;color:#c8820a}
  #nameScore{font-size:48px;font-weight:900;margin-bottom:18px;color:#1a1a2e;line-height:1}
  #nameInput{font-size:22px;font-weight:600;padding:14px 20px;border:2px solid #aabbcc;
    border-radius:12px;background:#fff;color:#1a1a2e;text-align:center;width:min(320px,90vw);
    outline:none;margin-bottom:14px}
  #nameInput:focus{border-color:#c8820a}
  #nameBtn{font-size:18px;font-weight:700;padding:13px 32px;border:none;border-radius:12px;
    background:linear-gradient(180deg,#7ee0a0,#39b56a);color:#06121f;cursor:pointer}
  #nameSkip{font-size:13px;color:#8899b8;margin-top:10px;cursor:pointer;text-decoration:underline}

  #lbSection{margin-top:14px}
  #lbTitle{font-size:14px;color:#5a6a8a;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
  #lbTable{width:min(360px,90vw);text-align:left;border-collapse:collapse}
  #lbTable th{font-size:11px;color:#8899b8;text-transform:uppercase;letter-spacing:.5px;
    padding:0 8px 6px;border-bottom:1px solid #ccd4e4}
  #lbTable td{padding:7px 8px;font-size:15px;border-bottom:1px solid #dde4f0}
  #lbTable tr:nth-child(1) td{color:#c8820a;font-weight:700}
  #lbTable tr:nth-child(2) td{color:#5a6a8a;font-weight:600}
  #lbTable tr:nth-child(3) td{color:#8a7060;font-weight:600}
  #lbTable .rank{color:#8899b8;font-size:13px;width:32px}
  #lbTable .pts{color:#c8820a;font-weight:700;text-align:right;width:56px}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="controls">
  <div id="scoreRow">
    <div id="collectedLabel">收集:</div>
    <div id="collectedCoins"></div>
  </div>
  <div id="hint">点击/触摸任何位置收集 · 空格键 = 收集中心</div>
</div>

<div id="overlay">
  <div id="overlayTitle">30秒时间机器</div>
  <div id="lbSection" style="display:none">
    <div id="lbTitle">🏆 排行榜</div>
    <table id="lbTable"><thead><tr><th>#</th><th>名字</th><th>分</th></tr></thead><tbody id="lbBody"></tbody></table>
  </div>
  <button id="btnMain">开始游戏</button>
</div>

<div id="nameModal">
  <div id="nameTitle">新纪录！</div>
  <div id="nameScore">0 分</div>
  <input id="nameInput" maxlength="12" placeholder="你的名字" autocomplete="off" />
  <button id="nameBtn">保存</button>
  <div id="nameSkip">跳过</div>
</div>

<script>
(function(){
"use strict";
const cv=document.getElementById('game');
const ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=Math.floor(W*DPR);cv.height=Math.floor(H*DPR);
  cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);resize();

// ── 5种银币类型定义 ─────────────────────────────────────────────────────────
const SILVER_TYPES=[
  {id:'tu',    name:'土的成语',     bg:'#8B6914', border:'#5a4010',
   icon:'tu',     pts:1, label:'土'},
  {id:'car',   name:'停车场声音',   bg:'#3a6ea8', border:'#1e4080',
   icon:'car',    pts:1, label:'P声'},
  {id:'fake',  name:'假币·盗',      bg:'#444444', border:'#1a1a1a',
   icon:'fake',   pts:1, label:'盗'},
  {id:'drink', name:'坦克喝酒',     bg:'#8B1A1A', border:'#5a1010',
   icon:'drink',  pts:1, label:'凯哥'},
  {id:'cat',   name:'伟大的猫',     bg:'#7a3a9a', border:'#4a2070',
   icon:'cat',    pts:1, label:'508'},
];

// ── 绘制每个银币图标（canvas绘图）────────────────────────────────────────────
function drawSilverIcon(x,y,typeId,size){
  const type=SILVER_TYPES.find(t=>t.id===typeId)||SILVER_TYPES[0];
  const r=size/2;
  // 底圆
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  const grad=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  grad.addColorStop(0,lighten(type.bg,30));
  grad.addColorStop(1,type.bg);
  ctx.fillStyle=grad;ctx.fill();
  // 边框
  ctx.strokeStyle=type.border;ctx.lineWidth=2;ctx.stroke();
  // 金属光泽
  ctx.beginPath();ctx.arc(x-r*0.3,y-r*0.3,r*0.25,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fill();

  ctx.save();
  ctx.textAlign='center';ctx.textBaseline='middle';
  if(typeId==='tu'){
    // 土的成语 → 落叶/土堆
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold '+(size*0.55)+'px serif';
    ctx.fillText('土',x,y+1);
  } else if(typeId==='car'){
    // 停车场声音 → P声
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold '+(size*0.42)+'px sans-serif';
    ctx.fillText('P声',x,y+1);
  } else if(typeId==='fake'){
    // 假币·盗 → 铜板+盗字
    ctx.beginPath();ctx.arc(x,y,r*0.72,0,Math.PI*2);
    ctx.fillStyle='#c8960c';ctx.fill();
    ctx.strokeStyle='#8a6010';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold '+(size*0.42)+'px sans-serif';
    ctx.fillText('盗',x,y+1);
  } else if(typeId==='drink'){
    // 坦克喝酒 → 凯哥
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold '+(size*0.42)+'px sans-serif';
    ctx.fillText('凯哥',x,y+1);
  } else if(typeId==='cat'){
    // 伟大的猫 → 508
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold '+(size*0.42)+'px sans-serif';
    ctx.fillText('508',x,y+1);
  }
  ctx.restore();
}

function lighten(hex,amount){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,(n>>16)+amount);
  const g=Math.min(255,((n>>8)&0xff)+amount);
  const b=Math.min(255,(n&0xff)+amount);
  return 'rgb('+r+','+g+','+b+')';
}

// 收集栏HTML（用canvas绘制的圆形）
function silverCoinHTML(typeId){
  const type=SILVER_TYPES.find(t=>t.id===typeId)||SILVER_TYPES[0];
  return '<div class="coin-icon" style="background:'+type.bg+';border:2px solid '+type.border+';font-size:10px;width:36px;height:36px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:700;line-height:1.1">'+type.label+'</div>';
}

// ── 常量 ────────────────────────────────────────────────────────────────────
const SESSION=30;
const BASE_SPAWN=0.42;
const BASE_BIG=0.12;
const COLLECT_R=78;
const FALL_V0=55;
const FALL_ACCEL=90;
const PHASE_EVERY=10;
const SPAWN_MULT=1.18;
const BIG_ADD=0.05;
const HUD_H=62;
const COLLECT_H=110;
const GAME_TOP=()=>HUD_H;
const GAME_BOT=()=>H-COLLECT_H;
let ptr={x:W/2,y:H/2,down:false};

// ── 游戏状态 ────────────────────────────────────────────────────────────────
let state='idle',score=0,best=+(localStorage.getItem('prestamoMejor')||0);
let elapsed=0,timeLeft=SESSION;
let coins=[];
let collected=[];
let rings=[];
let floatTexts=[];
let lastTs=0,spawnAcc=0;
let pendingScore=0;
let phase=0,lastPhase=0;
let currentSpawnRate=BASE_SPAWN,currentBigChance=BASE_BIG;
let milestones={50:false,100:false,150:false};
let easterEgg={active:false,text:'',emoji:'',age:0,dur:1.4};
const EGGS=[
  {e:'🎉',t:'恭喜！'},{e:'🌟',t:'太棒了！'},{e:'🔥',t:'厉害！'},
  {e:'⚡',t:'闪电速度！'},{e:'💎',t:'钻石级！'},{e:'🚀',t:'全速前进！'},
  {e:'🏆',t:'冠军！'},{e:'✨',t:'闪耀！'},{e:'🎯',t:'命中目标！'},{e:'💥',t:'爆炸！'}
];

function rand(a,b){return a+Math.random()*(b-a);}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function currentPhase(){return Math.floor(elapsed/PHASE_EVERY);}

// ── 生成金币 ────────────────────────────────────────────────────────────────
function spawnCoin(){
  const isBig=Math.random()<currentBigChance;
  // 银币随机选类型
  const silverType=isBig?null:SILVER_TYPES[Math.floor(Math.random()*SILVER_TYPES.length)].id;
  coins.push({
    x:rand(28,W-28),y:GAME_TOP()-22,
    vy:FALL_V0+rand(-15,15),vx:rand(-20,20),
    big:isBig,
    silverType:isBig?null:silverType,
    born:elapsed,collected:false,collectAt:null
  });
}

function addFloat(x,y,text,color,big){
  floatTexts.push({x,y,text,color,age:0,life:0.8,vx:rand(-12,12),vy:-65,big:!!big});
}

function startGame(){
  state='playing';score=0;elapsed=0;timeLeft=SESSION;
  coins=[];collected=[];rings=[];floatTexts=[];
  phase=0;lastPhase=0;currentSpawnRate=BASE_SPAWN;currentBigChance=BASE_BIG;
  milestones={50:false,100:false,150:false};
  easterEgg={active:false,text:'',emoji:'',age:0,dur:1.4};
  document.getElementById('collectedCoins').innerHTML='';
  lastTs=performance.now();
}

function endGame(){
  state='over';pendingScore=score;
  if(score>best){best=score;localStorage.setItem('prestamoMejor',best);}
  showOverlay();
}

function showOverlay(){
  const ov=document.getElementById('overlay');
  document.getElementById('overlayTitle').textContent='时间到！';
  document.getElementById('instructions').style.display='none';
  document.getElementById('btnMain').textContent='再玩一次';
  let sum=document.getElementById('summary');
  if(!sum){
    sum=document.createElement('div');
    sum.id='summary';
    sum.style.cssText='font-size:18px;line-height:1.7;color:#1a1a2e;margin-bottom:14px';
    ov.insertBefore(sum,document.getElementById('btnMain'));
  }
  sum.innerHTML='🪙 得分：<b style="color:#c8820a">'+pendingScore+'</b>';
  if(pendingScore>=100) sum.innerHTML+='<br><span style="color:#2a9a50;font-size:14px">🏆 进入排行榜！</span>';
  const lb=document.getElementById('lbSection');
  lb.style.display='flex';lb.style.flexDirection='column';lb.style.alignItems='center';
  renderLeaderboard();
  ov.style.display='flex';
}

function triggerEasterEgg(){
  const egg=pick(EGGS);
  easterEgg={active:true,text:egg.t,emoji:egg.e,age:0,dur:1.4};
  state='paused';
}

function checkMilestones(pts){
  for(const m of [50,100,150]){
    if(pts>=m && !milestones[m]){
      milestones[m]=true;
      addFloat(W/2,HUD_H+50,'¡'+m+'!','#c8820a',true);
      if(m===100) setTimeout(triggerEasterEgg,200);
    }
  }
}

function collectAt(px,py){
  if(state!=='playing') return;
  const R=COLLECT_R;
  let got=0;
  for(const c of coins){
    if(c.collected) continue;
    const dx=c.x-px,dy=c.y-py;
    if(dx*dx+dy*dy<=R*R){
      c.collected=true;c.collectAt=elapsed;
      const v=c.big?5:1;got+=v;
      collected.push(c.big?'big':(c.silverType||'tu'));
    }
  }
  if(got>0){
    score+=got;
    addFloat(px,py,'+'+got,'#c8820a');
    checkMilestones(score);
    renderCollectBar();
    rings.push({x:px,y:py,r:0,born:elapsed,maxR:R});
  }
}

function renderCollectBar(){
  document.getElementById('collectedCoins').innerHTML=collected.slice(-24).map(t=>
    t==='big'
    ? '<div class="coin-icon big" style="background:linear-gradient(135deg,#ffd700,#f5a623);border:2px solid #c8820a;font-size:10px;width:42px;height:42px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:700;line-height:1.1">💰</div>'
    : silverCoinHTML(t)
  ).join('');
}

// ── 排行榜 ─────────────────────────────────────────────────────────────────
const LB_KEY='prestamoLB';
function getLB(){try{return JSON.parse(localStorage.getItem(LB_KEY)||'[]');}catch{return [];}}
function saveLB(lb){localStorage.setItem(LB_KEY,JSON.stringify(lb));}
function addToLB(name,pts){
  const lb=getLB();
  lb.push({name:(name.trim().slice(0,12))||'匿名',pts,when:Date.now()});
  lb.sort((a,b)=>b.pts-a.pts);
  if(lb.length>20) lb.length=20;
  saveLB(lb);
}
function renderLeaderboard(){
  const lb=getLB();
  const body=document.getElementById('lbBody');
  if(lb.length===0){
    body.innerHTML='<tr><td colspan=3 style="color:#8899b8;font-size:14px;text-align:center;padding:16px">还没有记录，快来第一个！</td></tr>';
    return;
  }
  body.innerHTML=lb.slice(0,10).map((e,i)=>
    '<tr><td class="rank">'+(i+1)+'</td><td style="color:#1a1a2e">'+esc(e.name)+'</td><td class="pts">'+e.pts+'</td></tr>'
  ).join('');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function showNameModal(pts){
  const m=document.getElementById('nameModal');
  document.getElementById('nameScore').textContent=pts+' 分';
  document.getElementById('nameInput').value='';
  m.classList.add('show');
  setTimeout(()=>document.getElementById('nameInput').focus(),80);
}
function hideNameModal(){
  document.getElementById('nameModal').classList.remove('show');
  pendingScore=0;
  if(state==='over') document.getElementById('overlay').style.display='flex';
}

document.getElementById('nameBtn').addEventListener('click',function(){
  addToLB(document.getElementById('nameInput').value,pendingScore);
  hideNameModal();renderLeaderboard();
});
document.getElementById('nameInput').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('nameBtn').click();});
document.getElementById('nameSkip').addEventListener('click',function(){addToLB('匿名',pendingScore);hideNameModal();renderLeaderboard();});

// ── 更新逻辑 ────────────────────────────────────────────────────────────────
function update(dt){
  if(state==='paused'){
    easterEgg.age+=dt;
    if(easterEgg.age>=easterEgg.dur){
      state='playing';easterEgg.active=false;
    }
    return;
  }
  if(state!=='playing') return;
  elapsed+=dt;timeLeft-=dt;
  if(timeLeft<=0){timeLeft=0;endGame();return;}

  phase=currentPhase();
  if(phase>lastPhase){
    lastPhase=phase;
    currentSpawnRate=BASE_SPAWN*Math.pow(SPAWN_MULT,phase);
    currentBigChance=Math.min(0.35,BASE_BIG+BIG_ADD*phase);
    addFloat(W/2,HUD_H+30,'⚡ 第'+(phase+1)+'波！','#e05050',true);
  }

  spawnAcc+=currentSpawnRate*dt*5;
  while(spawnAcc>=1){spawnAcc-=1;spawnCoin();}

  for(const c of coins){
    if(c.collected) continue;
    c.vy+=(c.big?FALL_ACCEL*2.2:FALL_ACCEL)*dt;
    c.x+=c.vx*dt;c.y+=c.vy*dt;
    if(c.x<18||c.x>W-18) c.vx*=-0.65;
    c.x=Math.max(14,Math.min(W-14,c.x));
    if(c.y>GAME_BOT()+12){c.collected=true;c.collectAt=elapsed;}
  }
}

// ── 绘制 ───────────────────────────────────────────────────────────────────
function drawBackground(){
  ctx.fillStyle='#dde5f0';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(180,190,210,0.35)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawHUD(){
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,0.08)';ctx.shadowBlur=8;ctx.shadowOffsetY=2;
  ctx.fillRect(0,0,W,HUD_H);
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;

  ctx.fillStyle='#c8820a';ctx.font='bold 24px sans-serif';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('🪙 '+score,16,HUD_H/2);

  const timerColor=timeLeft<=5?'#e03030':'#1a1a2e';
  ctx.fillStyle=timerColor;ctx.font='bold 22px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('⏱ '+Math.ceil(timeLeft)+'秒',W/2,HUD_H/2);

  ctx.fillStyle='#8899b8';ctx.font='13px sans-serif';
  ctx.textAlign='right';
  ctx.fillText('最高：'+best,W-16,HUD_H/2);

  if(phase>0){
    ctx.fillStyle='#e05050';ctx.font='bold 11px sans-serif';
    ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillText('第'+phase+'波',W-16,HUD_H-4);
  }
}

function drawCollectCursor(){
  const R=COLLECT_R,x=ptr.x,y=ptr.y;
  ctx.save();
  ctx.setLineDash([6,5]);
  ctx.strokeStyle=ptr.down?'#c8820a':'rgba(200,130,10,0.5)';
  ctx.lineWidth=ptr.down?3:2;
  ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle=ptr.down?'#c8820a':'rgba(200,130,10,0.7)';
  ctx.lineWidth=ptr.down?2.5:1.5;
  ctx.beginPath();ctx.moveTo(x-R-6,y);ctx.lineTo(x+R+6,y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-R-6);ctx.lineTo(x,y+R+6);ctx.stroke();
  ctx.fillStyle=ptr.down?'#c8820a':'rgba(200,130,10,0.8)';
  ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawCoins(){
  for(const c of coins){
    if(c.collected){
      const dt2=elapsed-c.collectAt;
      if(dt2>0.25) continue;
      const t=dt2/0.25;
      ctx.globalAlpha=1-t;
      if(c.big){
        ctx.font=(56)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('💰',c.x,c.y);
      } else {
        drawSilverIcon(c.x,c.y,c.silverType||'tu',38*(1-t*0.5));
      }
      ctx.globalAlpha=1;
    } else {
      if(c.big){
        ctx.font='bold 56px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.shadowColor='rgba(200,130,10,0.25)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
        ctx.fillText('💰',c.x,c.y);
        ctx.shadowBlur=0;ctx.shadowOffsetY=0;
      } else {
        drawSilverIcon(c.x,c.y,c.silverType||'tu',38);
      }
    }
  }
}

function drawRings(){
  rings=rings.filter(r=>{
    const age=elapsed-r.born;
    if(age>0.45) return false;
    const t=age/0.45,alpha=(1-t)*0.85,rr=r.r+(r.maxR-r.r)*t;
    ctx.globalAlpha=alpha;
    ctx.strokeStyle='#c8820a';ctx.lineWidth=5*(1-t)+1;
    ctx.beginPath();ctx.arc(r.x,r.y,rr,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=(1-t)*0.1;ctx.fillStyle='#c8820a';
    ctx.beginPath();ctx.arc(r.x,r.y,rr,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    return true;
  });
}

function drawFloatTexts(){
  floatTexts=floatTexts.filter(f=>{
    f.age+=1/60;f.y+=f.vy/60;f.x+=f.vx/60;f.vy+=35/60;
    if(f.age>f.life) return false;
    const a=Math.max(0,1-f.age/f.life);
    ctx.globalAlpha=a;ctx.fillStyle=f.color;
    ctx.font=f.big?'bold 34px sans-serif':'bold 24px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.text,f.x,f.y);ctx.globalAlpha=1;
    return true;
  });
}

function drawEasterEgg(){
  if(!easterEgg.active) return;
  const t=Math.min(1,easterEgg.age/easterEgg.dur);
  let alpha=1;
  if(t<0.15) alpha=t/0.15;
  else if(t>0.72) alpha=(1-t)/0.28;
  ctx.globalAlpha=alpha;
  ctx.fillStyle='rgba(220,230,245,0.75)';ctx.fillRect(0,0,W,H);
  const sz=Math.min(W*0.38,130);
  ctx.font=sz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(easterEgg.emoji,W/2,H/2-35);
  ctx.fillStyle='#c8820a';ctx.font='bold 28px sans-serif';
  ctx.fillText(easterEgg.text,W/2,H/2+sz*0.55);
  ctx.globalAlpha=1;
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawHUD();
  if(state==='playing'||state==='paused') drawCollectCursor();
  drawRings();
  drawCoins();
  drawFloatTexts();
  if(state==='paused') drawEasterEgg();
  ctx.strokeStyle='rgba(180,190,210,0.5)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,GAME_BOT());ctx.lineTo(W,GAME_BOT());ctx.stroke();
}

function loop(ts){
  const dt=Math.min(0.05,(ts-lastTs)/1000||0);
  lastTs=ts;
  update(dt);
  if(state==='playing'||state==='paused') render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── 输入 ───────────────────────────────────────────────────────────────────
cv.addEventListener('pointermove',function(e){
  const r=cv.getBoundingClientRect();
  ptr.x=e.clientX-r.left;ptr.y=e.clientY-r.top;
});
cv.addEventListener('pointerdown',function(e){
  e.preventDefault();
  ptr.down=true;
  const r=cv.getBoundingClientRect();
  const x=e.clientX-r.left,y=e.clientY-r.top;
  ptr.x=x;ptr.y=y;
  if(state==='playing') collectAt(x,y);
  else if(state==='idle'){document.getElementById('overlay').style.display='none';startGame();}
},{passive:false});
cv.addEventListener('pointerup',function(){ptr.down=false;});
cv.addEventListener('pointercancel',function(){ptr.down=false;});

window.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='Enter'){
    e.preventDefault();
    if(state==='playing') collectAt(W/2,GAME_TOP()+(H-COLLECT_H-HUD_H)/2);
    else if(state==='idle'||state==='over'){
      if(document.getElementById('nameModal').classList.contains('show')) return;
      if(state==='over'&&pendingScore>=100) showNameModal(pendingScore);
      else {document.getElementById('overlay').style.display='none';startGame();}
    }
  }
});
document.getElementById('btnMain').addEventListener('click',function(){
  if(state==='over'&&pendingScore>=100) showNameModal(pendingScore);
  else {document.getElementById('overlay').style.display='none';startGame();}
});

(function(){const lb=getLB();if(lb.length>0){const s=document.getElementById('lbSection');s.style.display='flex';s.style.flexDirection='column';s.style.alignItems='center';renderLeaderboard();}})();
})();
</script>
